name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Pin the engine to a known-good commit. Keep in sync with scrape.yml.
      LEADERBOARD_REF: e3f046cfaf6926808a6da5307564b9c6c71ebce6
      # Engine checkout root (required by the engine's getDataDir).
      WORKSPACE_ROOT: ${{ github.workspace }}/app
      # Absolute path to the data repo checkout.
      LEADERBOARD_DATA_DIR: ${{ github.workspace }}/data
      # Substituted into config.yaml's data_explorer.source at build time.
      LEADERBOARD_DATA_DB_URL: ${{ vars.LEADERBOARD_DATA_DB_URL }}
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          path: data

      - name: Checkout leaderboard engine (upstream, pinned)
        uses: actions/checkout@v4
        with:
          repository: ohcnetwork/leaderboard
          ref: ${{ env.LEADERBOARD_REF }}
          path: app
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      # Full static export (all features — OG images, cached avatars). Vercel has
      # no 20k-file cap, so no trimming needed.
      - name: Build site
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build:packages
          pnpm data:import
          pnpm build:web

      # Deploy the prebuilt static output to Vercel (no Vercel-side build).
      # Requires: VERCEL_TOKEN (secret), VERCEL_ORG_ID + VERCEL_PROJECT_ID (vars).
      - name: Deploy to Vercel (prebuilt)
        working-directory: app/apps/leaderboard-web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          mkdir -p .vercel/output/static
          cp -r out/. .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json
          vercel deploy --prebuilt --prod --yes --archive=tgz --token="$VERCEL_TOKEN"

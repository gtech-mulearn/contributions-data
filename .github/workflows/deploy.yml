name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Pin the engine to a known-good commit. Keep in sync with scrape.yml.
      LEADERBOARD_REF: e3f046cfaf6926808a6da5307564b9c6c71ebce6
      # Engine checkout root (required by the engine's getDataDir).
      WORKSPACE_ROOT: ${{ github.workspace }}/app
      # Absolute path to the data repo checkout.
      LEADERBOARD_DATA_DIR: ${{ github.workspace }}/data
      LEADERBOARD_DATA_DB_URL: ${{ vars.LEADERBOARD_DATA_DB_URL }}
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          path: data

      - name: Checkout leaderboard engine (upstream, pinned)
        uses: actions/checkout@v4
        with:
          repository: ohcnetwork/leaderboard
          ref: ${{ env.LEADERBOARD_REF }}
          path: app
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Build site
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build:packages
          pnpm data:import
          pnpm build:web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/apps/leaderboard-web/out --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
